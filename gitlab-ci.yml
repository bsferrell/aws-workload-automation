stages:
  - provision
  - stop
  - cleanup

image: python:3.11-slim

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}         
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }} 

before_script:
  - echo "Setting up AWS environment..."
  - pip install boto3

deploy_workload:
  stage: provision
  script:
    - echo "Deploying Workload Node ..."
    - |
      if [ -z "$SUBNET_ID" ]; then
        echo "ERROR: SUBNET_ID variable is required but was not provided."
        exit 1
      fi
    - python Scripts/provision_workload_node.py --subnet-id "$SUBNET_ID"
  when: manual

nightly_shutdown_schedule:
  stage: stop
  script:
    - echo "Running scheduled off-hour shutdown sweep..."
    - python stop_workloads.py
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

terminate_environment:
  stage: cleanup
  script:
    - echo "Tearing down ephemeral infrastructure..."
    - terminate_workloads.py # (Assuming this is what you named your new script!)
  when: manual
